name: Supabase Readonly Audit

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-readonly-audit
  cancel-in-progress: false

jobs:
  readonly-audit:
    name: Supabase readonly audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DIRECT_URL: ${{ secrets.SUPABASE_DIRECT_URL }}
      EXPECTED_DATABASE_TARGET_FINGERPRINT: ${{ secrets.EXPECTED_DATABASE_TARGET_FINGERPRINT }}
      DATABASE_TARGET_GUARD_REQUIRED: "true"
      REAL_DATA_MODE: "false"
      REPORT_PATH: docs/audit/SUPABASE_READONLY_AUDIT_2026-07-12.md
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate secret presence
        shell: bash
        run: |
          if [ -z "${DIRECT_URL}" ]; then
            echo "SUPABASE_DIRECT_URL ausente. Configure o Repository secret antes da auditoria."
            exit 1
          fi
          if [ -z "${EXPECTED_DATABASE_TARGET_FINGERPRINT}" ]; then
            echo "EXPECTED_DATABASE_TARGET_FINGERPRINT ausente. Destino nao aprovado."
            exit 1
          fi
          echo "::add-mask::${DIRECT_URL}"
          echo "SUPABASE_DIRECT_URL presente. Valor oculto."

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate official database target
        run: python backend/scripts/database_target_guard.py validate --url-env DIRECT_URL

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Run readonly audit
        run: python backend/scripts/audit_supabase_readonly.py --output "${REPORT_PATH}"

      - name: Append safe report to job summary
        shell: bash
        run: cat "${REPORT_PATH}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload safe audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-readonly-audit
          path: docs/audit/SUPABASE_READONLY_AUDIT_2026-07-12.md
          if-no-files-found: error
