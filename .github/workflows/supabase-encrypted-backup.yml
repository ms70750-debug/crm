name: Supabase Encrypted Backup

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Digite CRIAR-BACKUP-CRIPTOGRAFADO para confirmar."
        required: true

permissions:
  contents: read

concurrency:
  group: supabase-encrypted-backup
  cancel-in-progress: false

jobs:
  encrypted-backup:
    name: Create encrypted PostgreSQL backup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DIRECT_URL: ${{ secrets.SUPABASE_DIRECT_URL }}
      BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
      REAL_DATA_MODE: "false"
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "CRIAR-BACKUP-CRIPTOGRAFADO" ]; then
            echo "Confirmacao invalida."
            exit 1
          fi
          if [ -z "$DIRECT_URL" ]; then
            echo "SUPABASE_DIRECT_URL ausente. Valor nao exibido."
            exit 1
          fi
          if [ -z "$BACKUP_ENCRYPTION_KEY" ]; then
            echo "BACKUP_ENCRYPTION_KEY ausente. Valor nao exibido."
            exit 1
          fi
          echo "::add-mask::$DIRECT_URL"
          echo "::add-mask::$BACKUP_ENCRYPTION_KEY"
          echo "Secrets presentes. Valores ocultos."

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17 || sudo apt-get install -y postgresql-client
          if [ -x /usr/lib/postgresql/17/bin/pg_dump ]; then
            echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
            export PATH="/usr/lib/postgresql/17/bin:$PATH"
          fi
          pg_dump --version

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Safe pg_dump preflight
        run: |
          PYTHONPATH=backend python - <<'PY'
          import os
          from scripts.create_encrypted_postgres_backup import backup_preflight

          result = backup_preflight(os.environ["DIRECT_URL"])
          print(f"pg_dump instalado: {'sim' if result['pg_dump_installed'] else 'nao'}")
          print(f"versao principal do pg_dump: {result['pg_dump_major'] or 'desconhecida'}")
          print(f"versao principal do servidor: {result['server_major'] or 'desconhecida'}")
          print(f"compatibilidade: {'sim' if result['compatible'] else 'nao'}")
          if not result["compatible"]:
            raise SystemExit("Cliente PostgreSQL incompativel com o servidor.")
          PY

      - name: Create encrypted backup
        run: python backend/scripts/create_encrypted_postgres_backup.py --output-dir backup-artifact

      - name: Verify artifact contents
        run: |
          test -n "$(find backup-artifact -name '*.dump.enc' -print -quit)"
          test -n "$(find backup-artifact -name '*.manifest.json' -print -quit)"
          test -n "$(find backup-artifact -name '*.sha256' -print -quit)"
          if find backup-artifact -name '*.dump' -print -quit | grep -q .; then
            echo "Dump aberto nao pode ser publicado como artifact."
            exit 1
          fi
          echo "Artifact contem somente backup criptografado, manifesto e checksums."

      - name: Upload encrypted backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-encrypted-backup
          path: |
            backup-artifact/*.dump.enc
            backup-artifact/*.manifest.json
            backup-artifact/*.sha256
          retention-days: 1
          if-no-files-found: error

      - name: Safe summary
        run: |
          echo "## Supabase Encrypted Backup" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backup criptografado: criado" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dump aberto no artifact: nao" >> "$GITHUB_STEP_SUMMARY"
          echo "- Upload externo: nao realizado" >> "$GITHUB_STEP_SUMMARY"
          echo "- Segredos exibidos: nao" >> "$GITHUB_STEP_SUMMARY"
