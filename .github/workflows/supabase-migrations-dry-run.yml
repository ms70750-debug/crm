name: Supabase Migrations Dry Run

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dry-run:
    name: Dry-run migrations PostgreSQL
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DIRECT_URL: ${{ secrets.SUPABASE_DIRECT_URL }}
      REAL_DATA_MODE: "false"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate secret presence
        shell: bash
        run: |
          if [ -z "${DIRECT_URL}" ]; then
            echo "SUPABASE_DIRECT_URL ausente. Configure o Repository secret antes de rodar o dry-run."
            exit 1
          fi
          echo "SUPABASE_DIRECT_URL presente. Valor oculto."

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Validate empty-schema chain and run safe dry-run
        run: python backend/scripts/apply_postgres_migrations.py
