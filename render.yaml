services:
  - type: web
    name: bbb-consig-crm-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /healthz
    autoDeploy: false
    envVars:
      - key: APP_ENV
        value: "production"
      - key: APP_MODE
        value: "demo"
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: BBB_AUTH_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: "http://localhost:5173,https://crm-sepia-beta.vercel.app"
      - key: DATABASE_URL
        sync: false
      - key: DB_POOL_SIZE
        value: "5"
      - key: DB_MAX_OVERFLOW
        value: "5"
      - key: DB_POOL_RECYCLE_SECONDS
        value: "1800"
      - key: DB_POOL_TIMEOUT_SECONDS
        value: "10"
      - key: REAL_DATA_MODE
        value: "false"
      - key: AUTH_EMAIL_ENABLED
        value: "false"
      - key: AUTH_EMAIL_MODE
        value: "simulate"
      - key: AUTH_EMAIL_FROM
        sync: false
      - key: APP_PUBLIC_URL
        value: "https://crm-sepia-beta.vercel.app"
      - key: RESEND_API_KEY
        sync: false
      - key: EVOLUTION_API_MODE
        value: "simulation"
