services:
  - type: web
    name: bbb-consig-crm-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /healthz
    autoDeploy: false
    envVars:
      - key: APP_ENV
        value: "production"
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: BBB_AUTH_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: "http://localhost:5173,https://crm-sepia-beta.vercel.app"
      - key: DATABASE_URL
        value: "sqlite:///./app.db"
      - key: REAL_DATA_MODE
        value: "false"
      - key: EVOLUTION_API_MODE
        value: "simulation"
